<section id="contact-container">
  <!-- Cuadro de formulario -->
  <div class="cuadro-contacto">
    <h3>Solicitar información</h3>
    <form id="formContacto">
      <label for="nombre">Nombre:</label>
      <input type="text" id="nombre" name="nombre" required>

      <label for="correo">Correo:</label>
      <input type="email" id="correo" name="correo" required>

      <label for="telefono">Teléfono:</label>
      <input type="tel" id="telefono" name="telefono" required>

      <label for="mensaje">Mensaje:</label>
      <textarea id="mensaje" name="mensaje" rows="4" required></textarea>

      <button type="submit">Solicitar</button>
    </form>
  </div>

  <!-- Cuadro de información fija -->
  <div class="cuadro-info">
    <h3>Información de contacto</h3>
    <p><strong>Nombre de la institución:</strong> CECyTE EMSaD 35 San Antonino El Alto</p>
    <p><strong>Teléfono:</strong> +52 1 221 592 2313</p>
    <p><strong>Redes sociales:</strong> 
      <a href="https://www.facebook.com/EMSaD35Oficial/s" target="_blank">
        Facebook Oficial
      </a>
    </p>
